name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            api/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('api/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --manifest-path api/Cargo.toml

      - name: cargo clippy
        run: cargo clippy --manifest-path api/Cargo.toml -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path api/Cargo.toml

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Check
        run: npm run check
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
